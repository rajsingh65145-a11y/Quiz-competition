<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Competition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Quiz Competition</h1>

    <p>Enter your name to start the quiz.</p>

    <input type="text" id="name" placeholder="Enter Your Name">

    <input type="text" id="class" placeholder="Enter Your Class">

    <input type="text" id="roll" placeholder="Enter Roll Number">

    <button onclick="startQuiz()">Start Quiz</button>

</div>

<script>

function startQuiz(){

    let name = document.getElementById("name").value;
    let studentClass = document.getElementById("class").value;
    let roll = document.getElementById("roll").value;


    if(name === "" || studentClass === "" || roll === ""){
        alert("Please fill all details");
        return;
    }


    localStorage.setItem("username", name);
    localStorage.setItem("class", studentClass);
    localStorage.setItem("roll", roll);


    window.location.href="quiz.html";

}

</script>

</body>
</html>
